site_name: PartDB Scanner
site_url: https://bartkepl.github.io/partdb_scanner/
repo_url: https://github.com/bartkepl/partdb_scanner
edit_uri: edit/main/doc/docs/
site_description: Documentation for the PartDB Scanner mobile app – an electronic component scanner and inventory manager
site_author: bartkepl
docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: deep-orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: deep-orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: pl
          name: Polski
          build: true
          nav_translations:
            Home: Strona główna
            Getting started: Pierwsze kroki
            Architecture: Architektura
            Overview: Przegląd
            Screens: Ekrany
            Search: Wyszukiwanie
            Part details: Szczegóły części
            Category browser: Przeglądarka kategorii
            IPN generator: Generator IPN
            Stock taking: Inwentaryzacja
            Label printing: Drukowanie etykiet
            Configuration: Konfiguracja
            REST API: API REST
            Data models: Modele danych

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html
  - footnotes
  - def_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Architecture:
    - Overview: architecture/index.md
  - Screens:
    - Overview: pages/index.md
    - Search: pages/search.md
    - Part details: pages/part-detail.md
    - Category browser: pages/category-browser.md
    - IPN generator: pages/ipn-generator.md
    - Stock taking: pages/stock-taking.md
    - Label printing: pages/label-print.md
    - Configuration: pages/config.md
  - REST API: api.md
  - Data models: models.md
