name: Flutter APK Rolling Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_release:
    name: Build Flutter APK and Upload to Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      
    steps:
      # 1️⃣ Pobranie kodu
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Instalacja Flutter ręcznie (Flutter 3.13.6 + Dart 3.9.x)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.13.6

      # 3️⃣ Wyłączenie telemetry (opcjonalne)
      - name: Disable Flutter telemetry
        run: flutter config --no-analytics

      # 4️⃣ Pobranie zależności
      - name: Install dependencies
        run: flutter pub get

      # 5️⃣ Build APK release
      - name: Build APK
        run: flutter build apk --release

      # 6️⃣ Przygotowanie pliku z ustaloną nazwą
      - name: Rename APK
        run: |
          mkdir -p build/apk
          cp build/app/outputs/flutter-apk/app-release.apk build/apk/partdb_scanner.apk

      # 7️⃣ Utworzenie lub aktualizacja release "latest" i upload APK
      - name: Publish APK to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: PartDB Scanner Rolling Release
          makeLatest: true
          artifacts: build/apk/partdb_scanner.apk
          token: ${{ secrets.GITHUB_TOKEN }}
