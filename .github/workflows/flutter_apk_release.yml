name: Flutter APK Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Get version from pubspec.yaml
        id: version
        run: |
          version=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
          version_name=$(echo "$version" | cut -d'+' -f1)
          tag="v${version_name}"
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "version_name=$version_name" >> $GITHUB_OUTPUT
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "Version: $version, Tag: $tag"

      - name: Check if tag already exists
        id: check_tag
        run: |
          tag=${{ steps.version.outputs.tag }}
          if git ls-remote --tags origin "refs/tags/$tag" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $tag already exists, skipping release."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build APK
        if: steps.check_tag.outputs.exists == 'false'
        run: flutter build apk --release

      - name: Prepare APK
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          mkdir -p build/apk
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/apk/partdb_scanner-${{ steps.version.outputs.version_name }}.apk

      - name: Create Tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: PartDB Scanner ${{ steps.version.outputs.version_name }}
          artifacts: build/apk/partdb_scanner-${{ steps.version.outputs.version_name }}.apk
          token: ${{ secrets.GITHUB_TOKEN }}
